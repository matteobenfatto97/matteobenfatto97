<svg width="360" height="104" viewBox="0 0 360 104" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="360" y2="104">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="58%" stop-color="#23121A"/>
      <stop offset="100%" stop-color="#EA4335"/>
    </linearGradient>

    <linearGradient id="stroke" x1="0" y1="0" x2="360" y2="0">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EA4335"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
      .label { font-size: 11px; font-weight: 800; letter-spacing: 3px; }
      .main { font-size: 23px; font-weight: 900; letter-spacing: 2px; }
      .sub { font-size: 10px; font-weight: 700; letter-spacing: 2px; }
      .pulse { animation: pulse 3s ease-in-out infinite; animation-delay: 2s; }
      @keyframes pulse {
        0%, 100% { opacity: .45; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect x="4" y="4" width="352" height="96" rx="22" fill="url(#bg)" opacity="0.96"/>
  <rect x="4.8" y="4.8" width="350.4" height="94.4" rx="21.2" stroke="url(#stroke)" stroke-width="1.6" opacity="0.85"/>

  <rect x="34" y="32" width="44" height="34" rx="8" fill="#EA4335" filter="url(#glow)"/>
  <path d="M39 39 L56 53 L73 39" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="98" y="34" class="mono label" fill="#FCA5A5">CONTACT</text>
  <text x="98" y="61" class="mono main" fill="#F8FAFC">EMAIL</text>
  <text x="98" y="80" class="mono sub" fill="#FCA5A5">START A CONVERSATION</text>

  <circle cx="324" cy="27" r="3.5" fill="#FCA5A5" filter="url(#glow)" class="pulse"/>
  <path d="M286 78 H326" stroke="#FCA5A5" stroke-width="2" opacity="0.55"/>
</svg>
