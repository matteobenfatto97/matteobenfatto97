<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="42%" stop-color="#8B5CF6"/>
      <stop offset="76%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="260" y1="0" x2="940" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="46%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="80" y1="0" x2="1120" y2="0">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="15%" stop-color="#38BDF8" stop-opacity="0.68"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#38BDF8" stop-opacity="0.68"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 180) rotate(90) scale(160 520)">
      <stop stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#2563EB" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono {
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 4px;
      }

      .title {
        font-size: 35px;
        font-weight: 900;
        letter-spacing: 3px;
      }

      .quote {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: .6px;
      }

      .small {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 3px;
      }

      .signature {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 4px;
      }

      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }

      .pulse2 {
        animation: pulse 3s ease-in-out infinite;
        animation-delay: 1s;
      }

      .pulse3 {
        animation: pulse 3s ease-in-out infinite;
        animation-delay: 2s;
      }

      .dash {
        stroke-dasharray: 8 14;
        animation: dash 17s linear infinite;
      }

      .dashReverse {
        stroke-dasharray: 6 12;
        animation: dashReverse 20s linear infinite;
      }

      .halo {
        animation: haloBreath 5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: .35; }
        50% { opacity: 1; }
      }

      @keyframes dash {
        from { stroke-dashoffset: 160; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes dashReverse {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: 160; }
      }

      @keyframes haloBreath {
        0%, 100% { opacity: .30; transform: scale(.985); }
        50% { opacity: .65; transform: scale(1); }
      }
    </style>
  </defs>

  <rect width="1200" height="360" fill="transparent"/>

  <rect x="24" y="32" width="1152" height="280" rx="30" fill="#050816" opacity="0.98"/>
  <rect x="25" y="33" width="1150" height="278" rx="29" stroke="url(#frame)" stroke-width="1.5" opacity="0.82"/>

  <ellipse cx="600" cy="172" rx="500" ry="150" fill="url(#coreGlow)" class="halo"/>

  <path d="M78 104 C248 54 390 72 522 110 C700 160 850 128 1030 78 C1080 64 1124 66 1140 74" stroke="#60A5FA" stroke-opacity=".28" stroke-width="1.3" class="dash"/>
  <path d="M80 258 C230 214 380 230 520 268 C700 318 910 292 1122 222" stroke="#8B5CF6" stroke-opacity=".26" stroke-width="1.2" class="dashReverse"/>

  <text x="72" y="70" class="mono eyebrow" fill="#94A3B8">MATTEO BENFATTO // FINAL TRANSMISSION</text>
  <text x="1128" y="70" text-anchor="end" class="mono eyebrow pulse" fill="#A78BFA">SIGNAL CLOSED · SYSTEM ACTIVE</text>

  <path d="M72 92 H270" stroke="url(#lineGrad)" stroke-width="2" opacity=".75"/>
  <path d="M930 92 H1128" stroke="url(#lineGrad)" stroke-width="2" opacity=".75"/>

  <circle cx="302" cy="92" r="4" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <circle cx="600" cy="92" r="4" fill="#8B5CF6" filter="url(#glow)" class="pulse2"/>
  <circle cx="898" cy="92" r="4" fill="#67E8F9" filter="url(#glow)" class="pulse3"/>

  <text x="600" y="136" text-anchor="middle" class="mono title" fill="url(#textGrad)" filter="url(#softGlow)">
    BUILDING INTELLIGENT SYSTEMS
  </text>

  <text x="600" y="176" text-anchor="middle" class="mono quote" fill="#CBD5E1">
    Engineering ideas into living software.
  </text>

  <text x="600" y="204" text-anchor="middle" class="mono quote" fill="#CBD5E1">
    Turning automation, intelligence and architecture into real-world impact.
  </text>

  <rect x="258" y="232" width="684" height="2.2" rx="1.1" fill="url(#lineGrad)" opacity=".9"/>

  <circle cx="430" cy="290" r="3.4" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <circle cx="600" cy="290" r="3.4" fill="#8B5CF6" filter="url(#glow)" class="pulse2"/>
  <circle cx="770" cy="290" r="3.4" fill="#67E8F9" filter="url(#glow)" class="pulse3"/>

  <path d="M430 290 C500 268 535 306 600 290 C670 272 710 306 770 290" stroke="url(#lineGrad)" stroke-width="1.4" opacity=".55" class="dash"/>
</svg>
