<svg width="1200" height="82" viewBox="0 0 1200 82" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="18%" stop-color="#38BDF8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="1"/>
      <stop offset="82%" stop-color="#38BDF8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="text" x1="300" y1="0" x2="900" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="55%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
      .label { font-size: 11px; font-weight: 800; letter-spacing: 4px; }
      .title { font-size: 22px; font-weight: 900; letter-spacing: 5px; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse { 0%,100% {opacity:.35} 50% {opacity:1} }
    </style>
  </defs>

  <rect width="1200" height="82" fill="transparent"/>
  <path d="M100 30 H360" stroke="url(#line)" stroke-width="2"/>
  <path d="M840 30 H1100" stroke="url(#line)" stroke-width="2"/>
  <circle cx="395" cy="30" r="4" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <circle cx="805" cy="30" r="4" fill="#8B5CF6" filter="url(#glow)" class="pulse"/>

  <text x="600" y="28" text-anchor="middle" class="mono label" fill="#64748B">TECH LAYER 02</text>
  <text x="600" y="58" text-anchor="middle" class="mono title" fill="url(#text)" filter="url(#glow)">BACKEND · APIS · AUTOMATION</text>
</svg>
