<svg width="360" height="104" viewBox="0 0 360 104" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="360" y2="104">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="55%" stop-color="#0A1A35"/>
      <stop offset="100%" stop-color="#0A66C2"/>
    </linearGradient>

    <linearGradient id="stroke" x1="0" y1="0" x2="360" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#0A66C2"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
      .label { font-size: 11px; font-weight: 800; letter-spacing: 3px; }
      .main { font-size: 23px; font-weight: 900; letter-spacing: 2px; }
      .sub { font-size: 10px; font-weight: 700; letter-spacing: 2px; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: .45; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect x="4" y="4" width="352" height="96" rx="22" fill="url(#bg)" opacity="0.96"/>
  <rect x="4.8" y="4.8" width="350.4" height="94.4" rx="21.2" stroke="url(#stroke)" stroke-width="1.6" opacity="0.85"/>

  <circle cx="56" cy="52" r="24" fill="#0A66C2" opacity="0.95" filter="url(#glow)"/>
  <text x="56" y="61" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900" fill="white">in</text>

  <text x="98" y="34" class="mono label" fill="#93C5FD">CONNECT</text>
  <text x="98" y="61" class="mono main" fill="#F8FAFC">LINKEDIN</text>
  <text x="98" y="80" class="mono sub" fill="#94A3B8">PROFESSIONAL NETWORK</text>

  <circle cx="324" cy="27" r="3.5" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <path d="M286 78 H326" stroke="#38BDF8" stroke-width="2" opacity="0.55"/>
</svg>
