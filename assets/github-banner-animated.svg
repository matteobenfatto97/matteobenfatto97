<svg width="1800" height="600" viewBox="0 0 1800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1800" y2="0">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="18%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.95"/>
      <stop offset="82%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="rightGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 300) rotate(90) scale(250 520)">
      <stop stop-color="#8B5CF6" stop-opacity="0.23"/>
      <stop offset="0.45" stop-color="#2563EB" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="leftGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 300) rotate(90) scale(180 430)">
      <stop stop-color="#38BDF8" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .pulse {
        animation: pulse 3.2s ease-in-out infinite;
      }

      .pulse2 {
        animation: pulse 3.2s ease-in-out infinite;
        animation-delay: 1.1s;
      }

      .pulse3 {
        animation: pulse 3.2s ease-in-out infinite;
        animation-delay: 2.1s;
      }

      .dash {
        stroke-dasharray: 8 16;
        animation: dash 16s linear infinite;
      }

      .dashReverse {
        stroke-dasharray: 6 14;
        animation: dashReverse 20s linear infinite;
      }

      .orb {
        animation: orbitGlow 5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.35; r: 2.5; }
        50% { opacity: 1; r: 5; }
      }

      @keyframes dash {
        from { stroke-dashoffset: 180; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes dashReverse {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: 180; }
      }

      @keyframes orbitGlow {
        0%, 100% { opacity: 0.22; }
        50% { opacity: 0.72; }
      }
    </style>
  </defs>

  <!-- Base banner -->
  <image href="github-banner.png" x="0" y="0" width="1800" height="600" preserveAspectRatio="xMidYMid slice"/>

  <!-- Premium cinematic overlays -->
  <rect width="1800" height="600" fill="url(#leftGlow)"/>
  <rect width="1800" height="600" fill="url(#rightGlow)" class="orb"/>

  <!-- Subtle top and bottom neon frame -->
  <rect x="0" y="0" width="1800" height="3" fill="url(#frame)" opacity="0.7"/>
  <rect x="0" y="597" width="1800" height="3" fill="url(#frame)" opacity="0.7"/>

  <!-- Elegant corner markers -->
  <path d="M42 42 H210" stroke="url(#frame)" stroke-width="2" opacity="0.75"/>
  <path d="M42 42 V118" stroke="#38BDF8" stroke-width="2" opacity="0.45"/>

  <path d="M1758 42 H1590" stroke="url(#frame)" stroke-width="2" opacity="0.75"/>
  <path d="M1758 42 V118" stroke="#8B5CF6" stroke-width="2" opacity="0.45"/>

  <path d="M42 558 H210" stroke="url(#frame)" stroke-width="2" opacity="0.55"/>
  <path d="M42 558 V482" stroke="#38BDF8" stroke-width="2" opacity="0.35"/>

  <path d="M1758 558 H1590" stroke="url(#frame)" stroke-width="2" opacity="0.55"/>
  <path d="M1758 558 V482" stroke="#8B5CF6" stroke-width="2" opacity="0.35"/>

  <!-- Constellation / AI signal lines -->
  <path d="M1010 92 C1110 40 1215 58 1305 96 C1390 132 1500 126 1615 78" stroke="#60A5FA" stroke-opacity="0.38" stroke-width="1.8" class="dash"/>
  <path d="M820 500 C980 440 1090 470 1230 505 C1390 545 1515 510 1665 430" stroke="#8B5CF6" stroke-opacity="0.30" stroke-width="1.6" class="dashReverse"/>

  <!-- Floating premium nodes -->
  <circle cx="1075" cy="82" r="3.5" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <circle cx="1185" cy="61" r="3.5" fill="#A78BFA" filter="url(#glow)" class="pulse2"/>
  <circle cx="1305" cy="96" r="3.5" fill="#60A5FA" filter="url(#glow)" class="pulse3"/>
  <circle cx="1508" cy="118" r="3.5" fill="#38BDF8" filter="url(#glow)" class="pulse2"/>
  <circle cx="1615" cy="78" r="3.5" fill="#A78BFA" filter="url(#glow)" class="pulse"/>

  <circle cx="880" cy="498" r="3" fill="#38BDF8" filter="url(#glow)" class="pulse3"/>
  <circle cx="1045" cy="462" r="3" fill="#8B5CF6" filter="url(#glow)" class="pulse"/>
  <circle cx="1230" cy="505" r="3" fill="#60A5FA" filter="url(#glow)" class="pulse2"/>
  <circle cx="1468" cy="518" r="3" fill="#A78BFA" filter="url(#glow)" class="pulse3"/>

  <!-- Minimal HUD text, subtle and premium -->
  <text x="64" y="536" fill="#94A3B8" opacity="0.55" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="15" font-weight="700" letter-spacing="3">
    SIGNAL VERIFIED // AI CORE ONLINE
  </text>

  <text x="1736" y="536" text-anchor="end" fill="#94A3B8" opacity="0.55" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="15" font-weight="700" letter-spacing="3">
    LEO CONSTELLATION NODE
  </text>
</svg>
