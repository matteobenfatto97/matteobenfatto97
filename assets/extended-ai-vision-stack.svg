<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="45%" stop-color="#8B5CF6"/>
      <stop offset="75%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="260" y1="0" x2="940" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="48%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="80" y1="0" x2="1120" y2="0">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="15%" stop-color="#38BDF8" stop-opacity="0.72"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="1"/>
      <stop offset="85%" stop-color="#38BDF8" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 140) rotate(90) scale(120 500)">
      <stop stop-color="#8B5CF6" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#2563EB" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono {
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 4px;
      }

      .title {
        font-size: 25px;
        font-weight: 900;
        letter-spacing: 4px;
      }

      .subtitle {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 3px;
      }

      .group {
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 3px;
      }

      .chip {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1.4px;
      }

      .footer {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 2.6px;
      }

      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }

      .pulse2 {
        animation: pulse 3s ease-in-out infinite;
        animation-delay: 1s;
      }

      .pulse3 {
        animation: pulse 3s ease-in-out infinite;
        animation-delay: 2s;
      }

      .dash {
        stroke-dasharray: 8 14;
        animation: dash 18s linear infinite;
      }

      .dashReverse {
        stroke-dasharray: 6 12;
        animation: dashReverse 22s linear infinite;
      }

      .halo {
        animation: haloBreath 5s ease-in-out infinite;
      }

      .twinkle {
        animation: twinkle 4s ease-in-out infinite;
      }

      .tw2 { animation-delay: 1s; }
      .tw3 { animation-delay: 2s; }
      .tw4 { animation-delay: 3s; }

      @keyframes pulse {
        0%, 100% { opacity: .35; }
        50% { opacity: 1; }
      }

      @keyframes dash {
        from { stroke-dashoffset: 180; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes dashReverse {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: 180; }
      }

      @keyframes haloBreath {
        0%, 100% { opacity: .30; transform: scale(.985); }
        50% { opacity: .64; transform: scale(1); }
      }

      @keyframes twinkle {
        0%, 100% { opacity: .18; }
        50% { opacity: .95; }
      }
    </style>
  </defs>

  <rect width="1200" height="280" fill="transparent"/>

  <rect x="28" y="24" width="1144" height="232" rx="28" fill="#050816" opacity="0.98"/>
  <rect x="29" y="25" width="1142" height="230" rx="27" stroke="url(#frame)" stroke-width="1.4" opacity="0.82"/>

  <ellipse cx="600" cy="140" rx="500" ry="120" fill="url(#coreGlow)" class="halo"/>

  <path d="M82 88 C230 42 380 58 520 92 C700 136 852 112 1030 64 C1080 52 1122 54 1140 62" stroke="#60A5FA" stroke-opacity=".25" stroke-width="1.2" class="dash"/>
  <path d="M82 214 C230 176 382 188 520 222 C702 266 908 238 1118 184" stroke="#8B5CF6" stroke-opacity=".25" stroke-width="1.2" class="dashReverse"/>

  <circle cx="126" cy="64" r="1.6" fill="#E2E8F0" class="twinkle"/>
  <circle cx="246" cy="226" r="1.5" fill="#67E8F9" class="twinkle tw2"/>
  <circle cx="390" cy="58" r="1.4" fill="#C4B5FD" class="twinkle tw3"/>
  <circle cx="960" cy="60" r="1.8" fill="#E2E8F0" class="twinkle tw4"/>
  <circle cx="1088" cy="214" r="1.6" fill="#67E8F9" class="twinkle tw2"/>

  <text x="72" y="58" class="mono eyebrow" fill="#94A3B8">EXTENDED STACK // AI VISION MODULE</text>
  <text x="1128" y="58" text-anchor="end" class="mono eyebrow pulse" fill="#A78BFA">SPECIALIZED LIBRARIES</text>

  <path d="M72 78 H270" stroke="url(#lineGrad)" stroke-width="2" opacity=".75"/>
  <path d="M930 78 H1128" stroke="url(#lineGrad)" stroke-width="2" opacity=".75"/>

  <circle cx="302" cy="78" r="4" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <circle cx="600" cy="78" r="4" fill="#8B5CF6" filter="url(#glow)" class="pulse2"/>
  <circle cx="898" cy="78" r="4" fill="#67E8F9" filter="url(#glow)" class="pulse3"/>

  <text x="600" y="112" text-anchor="middle" class="mono title" fill="url(#textGrad)" filter="url(#softGlow)">
    EXTENDED AI · DATA · VISION STACK
  </text>

  <text x="600" y="137" text-anchor="middle" class="mono subtitle" fill="#94A3B8">
    DATA MANIPULATION · MODELING · VISUAL INTELLIGENCE · SIMULATION
  </text>

  <!-- DATA GROUP -->
  <text x="100" y="174" class="mono group" fill="#38BDF8">DATA</text>

  <rect x="160" y="156" width="78" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="199" y="174" text-anchor="middle" class="mono chip" fill="#E2E8F0">NumPy</text>

  <rect x="248" y="156" width="82" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="289" y="174" text-anchor="middle" class="mono chip" fill="#E2E8F0">pandas</text>

  <rect x="340" y="156" width="82" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="381" y="174" text-anchor="middle" class="mono chip" fill="#E2E8F0">Polars</text>

  <rect x="432" y="156" width="116" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="490" y="174" text-anchor="middle" class="mono chip" fill="#E2E8F0">Matplotlib</text>

  <rect x="558" y="156" width="92" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="604" y="174" text-anchor="middle" class="mono chip" fill="#E2E8F0">Seaborn</text>

  <rect x="660" y="156" width="82" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="701" y="174" text-anchor="middle" class="mono chip" fill="#E2E8F0">Plotly</text>

  <!-- MODEL GROUP -->
  <text x="100" y="214" class="mono group" fill="#A78BFA">MODEL</text>

  <rect x="176" y="196" width="72" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="212" y="214" text-anchor="middle" class="mono chip" fill="#E2E8F0">Keras</text>

  <rect x="258" y="196" width="116" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="316" y="214" text-anchor="middle" class="mono chip" fill="#E2E8F0">torchvision</text>

  <rect x="384" y="196" width="136" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="452" y="214" text-anchor="middle" class="mono chip" fill="#E2E8F0">Albumentations</text>

  <rect x="530" y="196" width="148" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="604" y="214" text-anchor="middle" class="mono chip" fill="#E2E8F0">Ultralytics YOLO</text>

  <rect x="688" y="196" width="104" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="740" y="214" text-anchor="middle" class="mono chip" fill="#E2E8F0">MediaPipe</text>

  <rect x="802" y="196" width="60" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="832" y="214" text-anchor="middle" class="mono chip" fill="#E2E8F0">PCL</text>

  <rect x="872" y="196" width="72" height="28" rx="14" fill="#0B1120" stroke="#1E293B"/>
  <text x="908" y="214" text-anchor="middle" class="mono chip" fill="#E2E8F0">CARLA</text>

  <rect x="250" y="242" width="700" height="2.2" rx="1.1" fill="url(#lineGrad)" opacity=".92"/>
</svg>
