<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="30" y1="0" x2="1170" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D1FF"/>
      <stop offset="35%" stop-color="#6D5DF6"/>
      <stop offset="70%" stop-color="#A42BFF"/>
      <stop offset="100%" stop-color="#00D1FF"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="250" y1="0" x2="950" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D1FF"/>
      <stop offset="50%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#00D1FF"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 125) rotate(90) scale(120 360)">
      <stop stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowCenter" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 120) rotate(90) scale(140 460)">
      <stop stop-color="#8A2BE2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8A2BE2" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 125) rotate(90) scale(120 340)">
      <stop stop-color="#22D3EE" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tinyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono {
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
      }

      .caps {
        letter-spacing: 3px;
        font-weight: 700;
      }

      .micro {
        font-size: 12px;
      }

      .small {
        font-size: 13px;
      }

      .main {
        font-size: 35px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }

      .tag {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .status {
        animation: flicker 2.2s infinite ease-in-out;
      }

      .pulse {
        animation: pulse 2.5s infinite ease-in-out;
      }

      .scan {
        animation: scan 4.8s linear infinite;
      }

      .dash {
        stroke-dasharray: 8 12;
        animation: dashMove 8s linear infinite;
      }

      .line {
        opacity: 0;
        animation: rotateText 16s infinite;
      }

      .line2 { animation-delay: 4s; }
      .line3 { animation-delay: 8s; }
      .line4 { animation-delay: 12s; }

      @keyframes rotateText {
        0%   { opacity: 0; }
        5%   { opacity: 1; }
        22%  { opacity: 1; }
        27%  { opacity: 0; }
        100% { opacity: 0; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      @keyframes scan {
        0%   { transform: translateX(-300px); opacity: 0; }
        10%  { opacity: 0.16; }
        70%  { opacity: 0.16; }
        100% { transform: translateX(1300px); opacity: 0; }
      }

      @keyframes dashMove {
        from { stroke-dashoffset: 140; }
        to   { stroke-dashoffset: 0; }
      }

      @keyframes flicker {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="250" fill="transparent"/>
  <rect x="24" y="20" width="1152" height="210" rx="26" fill="#050816" opacity="0.96"/>
  <rect x="24.75" y="20.75" width="1150.5" height="208.5" rx="25.25" stroke="url(#borderGrad)" opacity="0.72"/>

  <!-- glow layers -->
  <ellipse cx="280" cy="125" rx="260" ry="95" fill="url(#glowLeft)"/>
  <ellipse cx="600" cy="125" rx="300" ry="110" fill="url(#glowCenter)"/>
  <ellipse cx="930" cy="125" rx="240" ry="100" fill="url(#glowRight)"/>

  <!-- animated scan -->
  <rect x="0" y="0" width="260" height="250" fill="url(#accentGrad)" opacity="0.08" class="scan"/>

  <!-- top frame labels -->
  <text x="60" y="48" class="mono micro caps" fill="#94A3B8">MATTEO BENFATTO // SIGNAL CORE</text>
  <text x="1055" y="48" text-anchor="end" class="mono micro caps status" fill="#A78BFA">STATUS: ONLINE</text>

  <!-- top decorative lines -->
  <path d="M60 63 H250" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6" class="dash"/>
  <path d="M950 63 H1140" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6" class="dash"/>

  <!-- pulse nodes -->
  <circle cx="58" cy="116" r="4.5" fill="#38BDF8" filter="url(#tinyGlow)" class="pulse"/>
  <circle cx="1142" cy="116" r="4.5" fill="#8A2BE2" filter="url(#tinyGlow)" class="pulse"/>

  <!-- constellation / circuit accents -->
  <path d="M74 176 C140 170 180 188 240 182 C300 176 340 192 410 184" stroke="#1D4ED8" stroke-opacity="0.45" stroke-width="1.4" class="dash"/>
  <path d="M790 74 C860 54 920 58 980 74 C1030 87 1080 96 1134 82" stroke="#60A5FA" stroke-opacity="0.35" stroke-width="1.4" class="dash"/>
  <circle cx="835" cy="68" r="2" fill="#60A5FA"/>
  <circle cx="920" cy="60" r="2" fill="#A78BFA"/>
  <circle cx="1010" cy="76" r="2" fill="#38BDF8"/>

  <!-- headline ribbon -->
  <text x="600" y="76" text-anchor="middle" class="mono small caps" fill="#CBD5E1">
    AI ENGINEERING · FULLSTACK SYSTEMS · AUTOMATION ARCHITECTURE
  </text>

  <!-- main animated lines -->
  <g filter="url(#softGlow)">
    <text x="600" y="122" text-anchor="middle" class="mono main line" fill="url(#textGrad)">
      AI-powered apps, automation and fullstack products.
    </text>

    <text x="600" y="122" text-anchor="middle" class="mono main line line2" fill="url(#textGrad)">
      Engineering ideas into living software.
    </text>

    <text x="600" y="122" text-anchor="middle" class="mono main line line3" fill="url(#textGrad)">
      Building systems that think, automate and evolve.
    </text>

    <text x="600" y="122" text-anchor="middle" class="mono main line line4" fill="url(#textGrad)">
      A point in the Leo constellation.
    </text>
  </g>

  <!-- support line -->
  <text x="600" y="152" text-anchor="middle" class="mono small" fill="#94A3B8">
    Turning complex ideas into elegant, intelligent and scalable software.
  </text>

  <!-- bottom info bar -->
  <rect x="92" y="178" width="230" height="28" rx="14" fill="#0B1222" stroke="#1E293B"/>
  <circle cx="112" cy="192" r="4" fill="#22D3EE" class="pulse"/>
  <text x="130" y="196" class="mono tag" fill="#E2E8F0">AI ENGINEERING</text>

  <rect x="350" y="178" width="230" height="28" rx="14" fill="#0B1222" stroke="#1E293B"/>
  <circle cx="370" cy="192" r="4" fill="#8B5CF6" class="pulse"/>
  <text x="388" y="196" class="mono tag" fill="#E2E8F0">FULLSTACK APPS</text>

  <rect x="608" y="178" width="230" height="28" rx="14" fill="#0B1222" stroke="#1E293B"/>
  <circle cx="628" cy="192" r="4" fill="#38BDF8" class="pulse"/>
  <text x="646" y="196" class="mono tag" fill="#E2E8F0">AUTOMATION SYSTEMS</text>

  <rect x="866" y="178" width="242" height="28" rx="14" fill="#0B1222" stroke="#1E293B"/>
  <circle cx="886" cy="192" r="4" fill="#A78BFA" class="pulse"/>
  <text x="904" y="196" class="mono tag" fill="#E2E8F0">CLOUD-READY ARCHITECTURE</text>

  <!-- bottom divider -->
  <rect x="210" y="218" width="780" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity="0.75"/>

  <!-- footer status -->
  <text x="600" y="238" text-anchor="middle" class="mono micro caps" fill="#64748B">
    SYSTEM ONLINE // INTELLIGENCE LAYER ACTIVE // SIGNAL VERIFIED
  </text>
</svg>
