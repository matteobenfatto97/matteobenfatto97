<svg width="640" height="112" viewBox="0 0 640 112" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="640" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="42%" stop-color="#8B5CF6"/>
      <stop offset="72%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <linearGradient id="text" x1="150" y1="0" x2="490" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="50%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 56) rotate(90) scale(60 250)">
      <stop stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="0.55" stop-color="#2563EB" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono {
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      }

      .label {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 3px;
      }

      .main {
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 4px;
      }

      .sub {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 3px;
      }

      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }

      .pulse2 {
        animation: pulse 3s ease-in-out infinite;
        animation-delay: 1.2s;
      }

      .dash {
        stroke-dasharray: 7 13;
        animation: dash 14s linear infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: .35; }
        50% { opacity: 1; }
      }

      @keyframes dash {
        from { stroke-dashoffset: 140; }
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <rect width="640" height="112" fill="transparent"/>

  <rect x="8" y="8" width="624" height="96" rx="24" fill="#050816" opacity="0.98"/>
  <rect x="9" y="9" width="622" height="94" rx="23" stroke="url(#frame)" stroke-width="1.5" opacity="0.8"/>

  <ellipse cx="320" cy="56" rx="250" ry="62" fill="url(#coreGlow)"/>

  <path d="M42 32 H170" stroke="url(#frame)" stroke-width="1.7" opacity="0.65"/>
  <path d="M470 32 H598" stroke="url(#frame)" stroke-width="1.7" opacity="0.65"/>
  <path d="M170 32 C230 58 275 22 320 34 C380 50 420 18 470 32" stroke="url(#frame)" stroke-width="1.3" opacity="0.52" class="dash"/>

  <circle cx="218" cy="48" r="3.5" fill="#38BDF8" filter="url(#glow)" class="pulse"/>
  <circle cx="320" cy="34" r="3.5" fill="#8B5CF6" filter="url(#glow)" class="pulse2"/>
  <circle cx="425" cy="47" r="3.5" fill="#60A5FA" filter="url(#glow)" class="pulse"/>

  <text x="320" y="60" text-anchor="middle" class="mono main" fill="url(#text)">
    PROFILE SIGNAL
  </text>

  <text x="320" y="82" text-anchor="middle" class="mono sub" fill="#64748B">
    VISITOR TELEMETRY · INTERACTION TRACE · SYSTEM PRESENCE
  </text>
</svg>
